<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--bg:#f5f2ec;--white:#fff;--forest:#1b4332;--forest-l:#2d6a4f;--sand:#c9a96e;--ember:#d4603a;--text:#1a1a1a;--sub:#555;--muted:#999;--light:#bbb;--border:#e0dbd2;--r:14px}
html,body{height:100%;overflow:hidden;font-family:'Noto Sans KR',system-ui,sans-serif;background:var(--bg);color:var(--text)}
button{font-family:inherit}

.app{height:100%;display:flex;flex-direction:column}

/* HEADER */
.hdr{background:var(--white);border-bottom:2px solid var(--border);padding:12px 16px 0;flex-shrink:0;z-index:20}
.hdr-top{display:flex;align-items:center;margin-bottom:8px}
.logo-crown{font-size:22px;margin-right:6px}
.logo-txt{font-size:20px;font-weight:900;color:var(--forest);font-family:'Black Han Sans',sans-serif}
.logo-sub{margin-left:8px;font-size:11px;color:var(--muted)}
.hdr-cnt{margin-left:auto;font-size:11px;font-weight:700;color:#fff;background:var(--forest);padding:4px 12px;border-radius:20px}
.search{width:100%;height:38px;border:1.5px solid var(--border);border-radius:10px;padding:0 14px;font-size:13px;outline:none;background:#faf8f3;margin-bottom:8px}
.search:focus{border-color:var(--forest)}
.chips{display:flex;flex-wrap:wrap;gap:0;padding-bottom:8px}
.chip{display:inline-flex;align-items:center;height:30px;padding:0 12px;border-radius:16px;font-size:11.5px;cursor:pointer;border:1.5px solid #ddd;background:var(--white);color:#888;margin:0 5px 5px 0;white-space:nowrap;transition:.12s;font-weight:400}
.chip.on{background:var(--forest);color:#fff;border-color:var(--forest);font-weight:700}
.chip.on-green{background:#16a34a;color:#fff;border-color:#16a34a;font-weight:700}
.chip.on-yellow{background:#b8860b;color:#fff;border-color:#b8860b;font-weight:700}
.chip:active{transform:scale(.95)}
.chip-div{width:1px;height:22px;background:#ddd;align-self:center;margin:0 3px 5px}

/* TABS */
.tabs{display:flex;background:var(--white);border-bottom:1px solid var(--border);flex-shrink:0;z-index:15}
.tab{flex:1;padding:12px 0;border:none;background:var(--white);color:var(--light);font-size:13px;font-weight:400;cursor:pointer;border-bottom:3px solid transparent;text-align:center}
.tab.on{background:var(--bg);color:var(--forest);font-weight:800;border-bottom-color:var(--forest)}

/* CONTENT */
.content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}

/* LIST */
.list-pad{padding:12px 14px 40px}

/* Stats */
.stats{display:flex;gap:8px;margin-bottom:14px}
.stat{flex:1;background:var(--white);border:1px solid var(--border);border-radius:12px;padding:10px;text-align:center}
.stat-n{font-size:22px;font-weight:900}
.stat-l{font-size:9px;margin-top:2px}

/* Card */
.card{display:flex;gap:12px;background:var(--white);border-radius:var(--r);padding:12px;margin-bottom:8px;border:1px solid #eae5da;box-shadow:0 1px 2px rgba(0,0,0,.03)}
.card-thumb{width:60px;height:60px;border-radius:10px;flex-shrink:0;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#fff;position:relative;overflow:hidden}
.card-thumb .vicon{font-size:20px}
.card-thumb .vlabel{font-size:7px;font-weight:700;margin-top:1px}
.card-badge{position:absolute;top:0;right:0;font-size:7px;font-weight:800;padding:1px 4px;border-radius:0 0 0 5px;color:#fff}
.card-info{flex:1;min-width:0}
.card-name{font-size:14px;font-weight:700;margin-bottom:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.card-meta{font-size:10.5px;color:var(--muted);margin-bottom:4px}
.card-tip{font-size:11px;color:var(--sub);line-height:1.35}

/* Ad */
.ad{margin:8px 0;padding:12px;border:1px dashed #ddd;border-radius:10px;text-align:center;font-size:9px;color:#ccc;background:#faf8f4}

/* Coupang */
.cp-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.cp-card{background:var(--white);border:1px solid var(--border);border-radius:14px;padding:16px;text-align:center;text-decoration:none;color:var(--text);display:block}
.cp-card:active{transform:scale(.97)}
.cp-card .em{font-size:28px;margin-bottom:4px}
.cp-card .nm{font-size:12px;font-weight:700;margin-bottom:2px}
.cp-card .desc{font-size:10px;color:var(--muted);margin-bottom:6px}
.cp-card .link{font-size:11px;color:var(--ember);font-weight:700}

/* Support */
.support{margin-top:28px;background:linear-gradient(135deg,#1b4332,#0d2818);border-radius:18px;padding:30px 20px;text-align:center;position:relative;overflow:hidden}
.support::before{content:'';position:absolute;top:-20px;right:-20px;width:100px;height:100px;background:rgba(255,255,255,.04);border-radius:50%}
.support-crown{font-size:40px;margin-bottom:10px}
.support h3{color:#fff;font-size:20px;font-weight:900;margin-bottom:6px}
.support p{color:rgba(255,255,255,.5);font-size:12px;margin-bottom:18px}
.support-acct{background:rgba(255,255,255,.12);border-radius:14px;padding:14px 18px;margin-bottom:16px}
.support-acct .bank{color:rgba(255,255,255,.5);font-size:10px;margin-bottom:4px}
.support-acct .num{color:#fff;font-size:20px;font-weight:900;letter-spacing:1px}
.support-btn{padding:14px 36px;background:var(--sand);color:var(--forest);border:none;border-radius:14px;font-size:15px;font-weight:800;cursor:pointer}
.support-btn:active{transform:scale(.95)}

/* Map */
#mapEl{width:100%;height:100%}
.map-wrap{width:100%;height:100%}
.leaflet-control-zoom{display:none}

/* Popup */
.leaflet-popup-content-wrapper{background:var(--white)!important;border-radius:12px!important;box-shadow:0 4px 20px rgba(0,0,0,.1)!important;border:none!important}
.leaflet-popup-tip{background:var(--white)!important}
.leaflet-popup-content{margin:12px 14px!important;font-family:'Noto Sans KR',sans-serif!important;font-size:12px!important}
.pp-n{font-size:13px;font-weight:700;margin-bottom:2px}
.pp-s{display:inline-block;font-size:9px;font-weight:700;padding:2px 7px;border-radius:4px;margin-bottom:4px}
.pp-g{background:#e8f5e9;color:#16a34a}
.pp-y{background:#fff8e1;color:#b8860b}
.pp-a{font-size:10.5px;color:var(--muted);margin-bottom:4px}
.pp-t{font-size:10.5px;color:var(--sub)}

.empty{text-align:center;padding:50px 20px;color:#aaa}
.empty .icon{font-size:36px;margin-bottom:8px}
.footer{margin-top:20px;text-align:center;font-size:10px;color:var(--light);padding-bottom:20px}

::-webkit-scrollbar{width:0;height:0}
</style>
</head>

const VE={"해변":"🏖","강변":"🏞","계곡":"⛰","산":"🌲","호수":"💧"};
const BG={"해변":"#4A90B8","강변":"#5A8C6A","계곡":"#6A9A5E","산":"#4D7A52","호수":"#5A8CA0"};
const RS=["전체","서울","경기","인천","강원","충북","충남","전북","전남","경북","경남","부산","울산","대구","대전","세종","광주","제주"];
const VTS=["전체","해변","강변","계곡","산","호수"];
const LTS=["전체","합법","묵인"];

let map,markers=[],curTab="list",fR="전체",fV="전체",fL="전체",sQ="";

function init(){
  renderHeader();
  renderTabs();
  renderContent();
}

function renderHeader(){
  document.getElementById('hdr').innerHTML=`
    <div class="hdr-top">
      <span class="logo-crown">👑</span>
      <span class="logo-txt">노숙왕</span>
      <span class="logo-sub">전국 차박 가이드</span>
      <span class="hdr-cnt" id="cnt">${filtered().length}곳</span>
    </div>
    <input class="search" id="si" placeholder="🔍 스팟 검색 (이름, 지역, 키워드)">
    <div class="chips" id="regionChips"></div>
    <div class="chips" id="filterChips"></div>
  `;
  // Region chips
  let rh='';RS.forEach(r=>{rh+=`<button class="chip${fR===r?' on':''}" onclick="setFilter('r','${r}')">${r}</button>`;});
  document.getElementById('regionChips').innerHTML=rh;
  // View + Legal chips
  let fh='';
  VTS.forEach(v=>{fh+=`<button class="chip${fV===v?' on':''}" onclick="setFilter('v','${v}')">${VE[v]||'🗺'} ${v}</button>`;});
  fh+='<span class="chip-div"></span>';
  LTS.forEach(l=>{
    const cls=fL===l?(l==='합법'?' on-green':l==='묵인'?' on-yellow':' on'):'';
    fh+=`<button class="chip${cls}" onclick="setFilter('l','${l}')">${l==='합법'?'🟢':l==='묵인'?'🟡':'📋'} ${l}</button>`;
  });
  document.getElementById('filterChips').innerHTML=fh;
  // Search
  document.getElementById('si').addEventListener('input',function(){sQ=this.value.trim().toLowerCase();renderContent();updateCnt();});
}

function setFilter(type,val){
  if(type==='r')fR=val;else if(type==='v')fV=val;else fL=val;
  renderHeader();renderContent();
  document.getElementById('si').value=sQ;
}

function renderTabs(){
  const f=filtered();
  document.getElementById('tabs').innerHTML=`
    <button class="tab${curTab==='list'?' on':''}" onclick="switchTab('list')">📋 목록 (${f.length})</button>
    <button class="tab${curTab==='map'?' on':''}" onclick="switchTab('map')">🗺️ 지도</button>
  `;
}

function switchTab(t){curTab=t;renderTabs();renderContent();}

function filtered(){
  return D.filter(s=>{
    if(fR!=='전체'&&s.r!==fR)return false;
    if(fV!=='전체'&&s.v!==fV)return false;
    if(fL!=='전체'&&s.l!==fL)return false;
    if(sQ&&!s.n.toLowerCase().includes(sQ)&&!s.r.includes(sQ)&&!s.t.toLowerCase().includes(sQ))return false;
    return true;
  });
}

function updateCnt(){
  const el=document.getElementById('cnt');if(el)el.textContent=filtered().length+'곳';
  renderTabs();
}

function renderContent(){
  const el=document.getElementById('content');
  if(curTab==='list'){renderList(el);}else{renderMap(el);}
  updateCnt();
}

function renderList(el){
  const spots=filtered();
  const tL=D.filter(s=>s.l==='합법').length;
  let h='<div class="list-pad">';
  // Stats
  h+=`<div class="stats">
    <div class="stat"><div class="stat-n" style="color:#1b4332">${D.length}</div><div class="stat-l" style="color:#999">전체</div></div>
    <div class="stat" style="background:#e8f5e9;border-color:#a5d6a7"><div class="stat-n" style="color:#16a34a">${tL}</div><div class="stat-l" style="color:#16a34a">🟢 합법</div></div>
    <div class="stat" style="background:#fff8e1;border-color:#ffe082"><div class="stat-n" style="color:#a07828">${D.length-tL}</div><div class="stat-l" style="color:#a07828">🟡 묵인</div></div>
  </div>`;
  if(spots.length===0){
    h+='<div class="empty"><div class="icon">🏕️</div>검색 결과가 없어요</div>';

function renderMap(el){
  el.innerHTML='<div class="map-wrap"><div id="mapEl"></div></div>';
  try{
    map=L.map('mapEl',{center:[36.5,127.8],zoom:7,zoomControl:false,attributionControl:false});
    L.tileLayer('https://{s}.basemaps.cartocdn.com/voyager/{z}/{x}/{y}{r}.png',{maxZoom:19,subdomains:'abcd'}).addTo(map);
    addMarkers();
  }catch(e){
    el.innerHTML='<div style="padding:40px;text-align:center"><div style="font-size:48px;margin-bottom:12px">🗺️</div><div style="font-size:16px;font-weight:700;color:#1b4332;margin-bottom:8px">지도를 불러오는 중...</div><p style="font-size:12px;color:#999">지도가 안 보이면 목록 탭을 이용해주세요</p><button onclick="switchTab(\'list\')" style="margin-top:16px;padding:10px 24px;background:#1b4332;color:#fff;border:none;border-radius:10px;font-size:13px;cursor:pointer">← 목록 보기</button></div>';
  }
}

function addMarkers(){
  markers.forEach(m=>map.removeLayer(m));markers=[];
  filtered().forEach(s=>{
    if(!s.lat||!s.lng)return;
    const c=s.l==='합법'?'#16a34a':'#b8860b';
    const ico=L.divIcon({className:'',html:`<div style="width:12px;height:12px;border-radius:50%;background:${c};border:2.5px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.2)"></div>`,iconSize:[12,12],iconAnchor:[6,6]});
    const m=L.marker([s.lat,s.lng],{icon:ico}).addTo(map);
    const cls=s.l==='합법'?'pp-g':'pp-y';
    m.bindPopup(`<div class="pp-n">${s.n}</div><div class="pp-s ${cls}">${s.l==='합법'?'🟢 합법':'🟡 묵인'}</div><div class="pp-a">${s.r} · ${VE[s.v]} ${s.v} · ${s.f}</div><div class="pp-t">💡 ${s.t}</div>`,{maxWidth:240,closeButton:false});
    markers.push(m);
  });
}

function flyToSpot(lat,lng,name){
  switchTab('map');
  setTimeout(()=>{
    if(map){
      map.flyTo([lat,lng],14,{duration:.6});
      setTimeout(()=>{markers.forEach(m=>{const l=m.getLatLng();if(Math.abs(l.lat-lat)<.003&&Math.abs(l.lng-lng)<.003)m.openPopup();});},700);
    }
  },200);
}

function copyAcct(){
  navigator.clipboard.writeText('29489058920207').then(()=>alert('✅ 계좌번호가 복사되었습니다!\n하나은행 294-890589-20207'));
}
