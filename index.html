<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#f7f5f0;--card:#fff;--forest:#1a3c2a;--forest-m:#2d5a3f;--forest-l:#3d7a55;
  --sand:#c4a265;--sand-l:#d4b87a;--ember:#c75b39;--ember-l:#e07050;
  --text:#1c1c1c;--sub:#555;--muted:#888;--light:#bbb;--pale:#d5d0c6;
  --border:rgba(0,0,0,.08);--r:16px;--shadow:0 2px 12px rgba(0,0,0,.06);
}
html,body{height:100%;overflow:hidden;font-family:'Noto Sans KR',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased}
button{font-family:inherit;cursor:pointer}
a{text-decoration:none;color:inherit}

/* SPLASH */
.splash{position:fixed;inset:0;z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--forest);transition:opacity .5s,visibility .5s}
.splash.hide{opacity:0;visibility:hidden}
.splash-crown{font-size:48px;animation:bounce 1s ease infinite}
.splash-name{font-family:'Black Han Sans';font-size:36px;color:#fff;margin-top:8px;letter-spacing:2px}
.splash-sub{font-size:12px;color:rgba(255,255,255,.4);margin-top:8px}
.splash-bar{width:120px;height:3px;background:rgba(255,255,255,.15);border-radius:3px;margin-top:20px;overflow:hidden}
.splash-bar::after{content:'';display:block;width:40%;height:100%;background:var(--sand);border-radius:3px;animation:load .8s ease-in-out infinite alternate}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes load{0%{transform:translateX(-10px)}100%{transform:translateX(80px)}}

/* APP SHELL */
.app{height:100%;display:flex;flex-direction:column;opacity:0;transition:opacity .3s}
.app.show{opacity:1}

/* HEADER */
.hdr{flex-shrink:0;background:var(--card);border-bottom:1px solid var(--border);padding:0 16px;z-index:100}
.hdr-row1{display:flex;align-items:center;height:52px}
.logo{display:flex;align-items:center;gap:6px}
.logo-crown{font-size:20px}
.logo-name{font-family:'Black Han Sans';font-size:20px;color:var(--forest)}
.logo-dot{width:5px;height:5px;border-radius:50%;background:var(--sand);margin:0 4px}
.logo-sub{font-size:11px;color:var(--muted);font-weight:500}
.hdr-badge{margin-left:auto;font-size:11px;font-weight:700;color:#fff;background:var(--forest);padding:4px 12px;border-radius:20px;letter-spacing:.5px}

/* SEARCH */
.search-wrap{position:relative;margin:4px 0 8px}
.search-ico{position:absolute;left:12px;top:50%;transform:translateY(-50%);width:16px;height:16px;color:var(--light)}
.search{width:100%;height:40px;border:1.5px solid var(--pale);border-radius:12px;padding:0 14px 0 36px;font-size:13px;outline:none;background:var(--bg);color:var(--text);transition:border .2s}
.search:focus{border-color:var(--forest-m);background:var(--card)}
.search::placeholder{color:var(--light)}

/* CHIPS */
.chips{display:flex;gap:6px;overflow-x:auto;padding-bottom:8px;scrollbar-width:none;-ms-overflow-style:none}
.chips::-webkit-scrollbar{display:none}
.chip{flex-shrink:0;padding:6px 14px;border-radius:20px;font-size:12px;font-weight:600;border:1.5px solid var(--pale);background:transparent;color:var(--sub);white-space:nowrap;transition:all .2s}
.chip.on{background:var(--forest);color:#fff;border-color:var(--forest)}
.chip.on-g{background:#16653a;color:#fff;border-color:#16653a}
.chip.on-y{background:#a68520;color:#fff;border-color:#a68520}

/* TABS */
.tabs{display:flex;border-bottom:1px solid var(--border);background:var(--card)}
.tab{flex:1;height:42px;display:flex;align-items:center;justify-content:center;gap:6px;font-size:13px;font-weight:600;color:var(--muted);border:none;background:none;border-bottom:2.5px solid transparent;transition:all .2s}
.tab.on{color:var(--forest);border-bottom-color:var(--forest)}
.tab svg{width:16px;height:16px}

/* CONTENT */
.content{flex:1;overflow:hidden;position:relative}
.panel{position:absolute;inset:0;overflow-y:auto;transition:opacity .2s;-webkit-overflow-scrolling:touch}
.panel.hide{opacity:0;pointer-events:none;z-index:0}
.panel.show{opacity:1;pointer-events:auto;z-index:1}

/* LIST */
.list{padding:12px 16px 100px}
.card{background:var(--card);border-radius:var(--r);padding:14px;margin-bottom:10px;box-shadow:var(--shadow);display:flex;gap:12px;align-items:flex-start;border:1px solid var(--border);transition:transform .15s,box-shadow .15s;cursor:pointer}
.card:active{transform:scale(.985);box-shadow:0 1px 6px rgba(0,0,0,.04)}
.card-icon{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.card-body{flex:1;min-width:0}
.card-head{display:flex;align-items:center;gap:6px;margin-bottom:3px}
.card-name{font-size:14px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.card-badge{font-size:9px;font-weight:700;padding:2px 7px;border-radius:8px;flex-shrink:0}
.badge-g{background:#e6f4ea;color:#16653a}
.badge-y{background:#fef3d0;color:#8a6d14}
.card-meta{font-size:11px;color:var(--muted);margin-bottom:4px}
.card-tip{font-size:11.5px;color:var(--sub);line-height:1.4}
.card-arrow{color:var(--light);font-size:11px;align-self:center;flex-shrink:0}

/* AD SLOT */
.ad-slot{margin:8px 0;padding:14px;border:1px dashed var(--pale);border-radius:var(--r);text-align:center;font-size:10px;color:var(--light);background:rgba(255,255,255,.5)}

/* COUPANG */
.cpg-title{font-size:15px;font-weight:800;margin:20px 0 10px;color:var(--forest)}
.cpg-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.cpg-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:16px 10px;text-align:center;transition:transform .15s}
.cpg-card:active{transform:scale(.97)}
.cpg-emoji{font-size:28px;margin-bottom:4px}
.cpg-name{font-size:12px;font-weight:700}
.cpg-desc{font-size:10px;color:var(--muted);margin-bottom:6px}
.cpg-link{font-size:11px;color:var(--ember);font-weight:700}
.cpg-notice{font-size:8px;color:var(--light);text-align:center;margin-top:8px}

/* SPONSOR */
.sponsor{margin:24px 0;background:linear-gradient(135deg,var(--forest),#0f2418);border-radius:20px;padding:32px 20px;text-align:center}
.sponsor-crown{font-size:36px;margin-bottom:8px}
.sponsor-title{color:#fff;font-size:18px;font-weight:900;margin-bottom:6px}
.sponsor-desc{color:rgba(255,255,255,.45);font-size:11px;margin-bottom:20px;line-height:1.5}
.sponsor-box{background:rgba(255,255,255,.1);border-radius:14px;padding:14px 18px;margin-bottom:16px}
.sponsor-bank{color:rgba(255,255,255,.45);font-size:10px;margin-bottom:4px}
.sponsor-acct{color:#fff;font-size:20px;font-weight:900;letter-spacing:1px;font-family:'Black Han Sans'}
.sponsor-btn{display:inline-flex;align-items:center;gap:6px;padding:12px 32px;background:var(--sand);color:var(--forest);border:none;border-radius:12px;font-size:14px;font-weight:800}
.sponsor-btn:active{opacity:.85}

/* FOOTER */
.footer{padding:20px 0 40px;text-align:center;font-size:10px;color:var(--light);line-height:1.6}

/* MAP */
#mapContainer{position:absolute;inset:0}

/* MAP OVERLAY */
.map-legend{position:absolute;bottom:20px;left:12px;z-index:10;background:rgba(255,255,255,.95);backdrop-filter:blur(8px);border-radius:12px;padding:10px 14px;box-shadow:0 2px 12px rgba(0,0,0,.12);font-size:11px}
.map-legend-item{display:flex;align-items:center;gap:6px;margin-bottom:4px}
.map-legend-item:last-child{margin-bottom:0}
.map-legend-dot{width:10px;height:10px;border-radius:50%;border:2px solid #fff;box-shadow:0 0 3px rgba(0,0,0,.2)}

/* MY LOCATION BTN */
.loc-btn{position:absolute;bottom:20px;right:12px;z-index:10;width:42px;height:42px;background:rgba(255,255,255,.95);backdrop-filter:blur(8px);border:none;border-radius:50%;box-shadow:0 2px 12px rgba(0,0,0,.12);display:flex;align-items:center;justify-content:center}
.loc-btn svg{width:20px;height:20px;color:var(--forest)}

/* POPUP */
.info-popup{position:fixed;bottom:0;left:0;right:0;z-index:200;background:var(--card);border-radius:20px 20px 0 0;box-shadow:0 -4px 20px rgba(0,0,0,.12);padding:20px 20px 32px;transform:translateY(100%);transition:transform .3s cubic-bezier(.32,.72,0,1)}
.info-popup.open{transform:translateY(0)}
.info-popup .handle{width:36px;height:4px;background:var(--pale);border-radius:4px;margin:0 auto 16px}
.info-popup .p-head{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.info-popup .p-icon{width:48px;height:48px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:22px}
.info-popup .p-name{font-size:16px;font-weight:800}
.info-popup .p-badge{font-size:10px;font-weight:700;padding:3px 8px;border-radius:8px}
.info-popup .p-meta{font-size:12px;color:var(--muted);margin-bottom:8px}
.info-popup .p-tip{font-size:13px;color:var(--sub);line-height:1.5;padding:10px 14px;background:var(--bg);border-radius:12px;margin-bottom:12px}
.info-popup .p-nav{display:inline-flex;align-items:center;gap:6px;padding:10px 20px;background:var(--forest);color:#fff;border:none;border-radius:12px;font-size:13px;font-weight:700}
.overlay{position:fixed;inset:0;z-index:190;background:rgba(0,0,0,.3);opacity:0;visibility:hidden;transition:all .3s}
.overlay.open{opacity:1;visibility:visible}

@media(min-width:768px){
  .list{max-width:560px;margin:0 auto}
}
</style>
</head>

// ============ FILTERS ============
function filtered(){
  return D.filter(s=>{
    if(fR!=="전체"&&s.r!==fR) return false;
    if(fV!=="전체"&&s.v!==fV) return false;
    if(fL!=="전체"&&s.l!==fL) return false;
    if(sQ){
      const q=sQ;
      if(!((s.n+s.r+s.v+s.t+s.f).toLowerCase().includes(q))) return false;
    }
    return true;
  });
}

function setFilter(type,val){
  if(type==='r') fR=val;
  else if(type==='v') fV=val;
  else if(type==='l') fL=val;
  renderChips();
  renderList();
  if(curTab==='map') renderMapMarkers();
}

function renderChips(){
  let rh='';
  REGIONS.forEach(r=>{rh+=`<button class="chip${fR===r?' on':''}" onclick="setFilter('r','${r}')">${r}</button>`;});
  document.getElementById('regionChips').innerHTML=rh;

  let fh='';
  VIEWS.forEach(v=>{fh+=`<button class="chip${fV===v?' on':''}" onclick="setFilter('v','${v}')">${VE[v]||'🗺️'} ${v}</button>`;});
  fh+='<span style="width:1px;height:20px;background:var(--pale);flex-shrink:0;margin:0 4px"></span>';
  LEGALS.forEach(l=>{
    const cls=fL===l?(l==='합법'?' on-g':l==='묵인'?' on-y':' on'):'';
    fh+=`<button class="chip${cls}" onclick="setFilter('l','${l}')">${l==='합법'?'🟢':l==='묵인'?'🟡':'🗺️'} ${l}</button>`;
  });
  document.getElementById('filterChips').innerHTML=fh;

  const f=filtered();
  document.getElementById('badge').textContent=f.length+'곳';
}

// ============ TABS ============
function switchTab(tab){
  curTab=tab;
  document.getElementById('tabList').classList.toggle('on',tab==='list');
  document.getElementById('tabMap').classList.toggle('on',tab==='map');
  document.getElementById('listPanel').classList.toggle('show',tab==='list');
  document.getElementById('listPanel').classList.toggle('hide',tab!=='list');
  document.getElementById('mapPanel').classList.toggle('show',tab==='map');
  document.getElementById('mapPanel').classList.toggle('hide',tab!=='map');
  if(tab==='map' && !kakaoMap) initKakaoMap();
  if(tab==='map' && kakaoMap) renderMapMarkers();
}

// ============ KAKAO MAP ============
function initKakaoMap(){
  if(typeof kakao==='undefined'||!kakao.maps){
    document.getElementById('mapContainer').innerHTML='<div style="display:flex;align-items:center;justify-content:center;height:100%;flex-direction:column;gap:12px;color:var(--muted);font-size:13px"><div style="font-size:40px">🗺️</div>카카오맵을 불러오는 중...</div>';
    // Retry after SDK loads
    setTimeout(initKakaoMap, 1000);
    return;
  }
  kakao.maps.load(()=>{
    const container=document.getElementById('mapContainer');
    container.innerHTML='';
    const options={
      center:new kakao.maps.LatLng(36.5,127.5),
      level:13
    };
    kakaoMap=new kakao.maps.Map(container,options);
    kakaoInfoW=new kakao.maps.InfoWindow({zIndex:1});
    renderMapMarkers();
    // Resize fix
    setTimeout(()=>kakaoMap.relayout(),100);
  });
}

function renderMapMarkers(){
  if(!kakaoMap) return;
  // Clear
  kakaoMarkers.forEach(m=>m.setMap(null));
  kakaoMarkers=[];
  if(kakaoInfoW) kakaoInfoW.close();

  const f=filtered();
  f.forEach(s=>{
    const pos=new kakao.maps.LatLng(s.la,s.lo);
    const color=s.l==='합법'?'%2316653a':'%23c4a265';
    const svg=`<svg xmlns="http://www.w3.org/2000/svg" width="28" height="36" viewBox="0 0 28 36"><path d="M14 0C6.3 0 0 6.3 0 14c0 10.5 14 22 14 22s14-11.5 14-22C28 6.3 21.7 0 14 0z" fill="${color}" stroke="white" stroke-width="2"/><circle cx="14" cy="13" r="5" fill="white" opacity="0.9"/></svg>`;
    const imgSrc='data:image/svg+xml;charset=utf-8,'+svg;
    const imgSize=new kakao.maps.Size(28,36);
    const imgOpt={offset:new kakao.maps.Point(14,36)};
    const markerImage=new kakao.maps.MarkerImage(imgSrc,imgSize,imgOpt);
    const marker=new kakao.maps.Marker({position:pos,image:markerImage,map:kakaoMap});

    kakao.maps.event.addListener(marker,'click',()=>{
      openPopup(D.indexOf(s));
    });

    kakaoMarkers.push(marker);
  });
}

function flyToSpot(idx){
  const s=D[idx];
  if(!s) return;
  switchTab('map');
  setTimeout(()=>{
    if(kakaoMap){
      const pos=new kakao.maps.LatLng(s.la,s.lo);
      kakaoMap.setLevel(5);
      kakaoMap.panTo(pos);
    }
  },200);
}

function goMyLocation(){
  if(!navigator.geolocation){alert('위치 서비스를 지원하지 않습니다');return;}
  navigator.geolocation.getCurrentPosition(p=>{
    if(kakaoMap){
      const pos=new kakao.maps.LatLng(p.coords.latitude,p.coords.longitude);
      kakaoMap.setLevel(8);
      kakaoMap.panTo(pos);
    }
  },()=>alert('위치 정보를 가져올 수 없습니다'));
}

// ============ POPUP ============
function openPopup(idx){
  const s=D[idx];
  if(!s) return;
  const bc=s.l==='합법'?'badge-g':'badge-y';
  const ic=VC[s.v]||'#666';
  const naverUrl=`https://map.naver.com/v5/search/${encodeURIComponent(s.n)}`;
  const kakaoUrl=`https://map.kakao.com/link/search/${encodeURIComponent(s.n)}`;

  document.getElementById('popupContent').innerHTML=`
    <div class="p-head">
      <div class="p-icon" style="background:${ic}15;color:${ic};font-size:24px">${VE[s.v]||'📍'}</div>
      <div>
        <div style="display:flex;align-items:center;gap:6px"><span class="p-name">${s.n}</span><span class="p-badge ${bc}">${s.l}</span></div>
        <div class="p-meta">${s.r} · ${VE[s.v]} ${s.v} · ${s.f}</div>
      </div>
    </div>
    <div class="p-tip">💡 ${s.t}${s.l==='묵인'?'<br><br>⚠️ 묵인 스팟입니다. 텐트 설치·취사는 자제하고, 차 안에서만 조용히 이용해주세요.':''}</div>
    <div style="display:flex;gap:8px">
      <a href="${naverUrl}" target="_blank" rel="noopener" class="p-nav" style="flex:1;justify-content:center;text-decoration:none">🧭 네이버지도</a>
      <a href="${kakaoUrl}" target="_blank" rel="noopener" class="p-nav" style="flex:1;justify-content:center;background:var(--sand);color:var(--forest);text-decoration:none">🗺️ 카카오맵</a>
    </div>
    <button onclick="flyToSpot(${idx})" style="width:100%;margin-top:8px;padding:10px;background:var(--bg);border:1.5px solid var(--pale);border-radius:12px;font-size:13px;font-weight:600;color:var(--sub)">📍 지도에서 보기</button>
  `;
  document.getElementById('overlay').classList.add('open');
  document.getElementById('popup').classList.add('open');
}

function closePopup(){
  document.getElementById('overlay').classList.remove('open');
  document.getElementById('popup').classList.remove('open');
}

  }).catch(()=>{
    prompt('계좌번호를 복사해주세요:','29489058920207');
  });
